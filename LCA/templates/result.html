<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: white;
            display: flex;
            justify-content: center;

            height: 100vh;
        }
        .container {

            font-weight: bold;
        }
        a:hover {
            color: #00b3a4;
        }

<body>
    <div class="container">
        <h2>Predicted CO₂ Emission</h2>
